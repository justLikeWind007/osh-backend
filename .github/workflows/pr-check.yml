name: PR Build Check

on:
  pull_request:
    branches:
      - 'release/**'
      - 'main'
      - 'master'

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build backend
        run: mvn clean install -DskipTests -pl '!backstage-flink'

      - name: Verify jar exists
        run: test -f backstage-admin/target/backstage-admin.jar
