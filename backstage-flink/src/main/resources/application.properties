flink.job-name=backstage-course-index-job
flink.parallelism=1
flink.checkpoint.interval-ms=60000
flink.checkpoint.min-pause-ms=30000
flink.checkpoint.timeout-ms=600000
flink.checkpoint.max-concurrent=1
flink.checkpoint.tolerable-failures=3
flink.restart.attempts=3
flink.restart.delay-ms=10000

kafka.bootstrap-servers=43.242.200.25:9092
kafka.group-id=backstage-course-index-flink
kafka.start-mode=earliest

course.index.create-topic=osh.course.index.create
course.index.update-topic=osh.course.index.update
course.index.delete-topic=osh.course.index.delete

tool.index.group-id=backstage-tool-index-flink
tool.index.start-mode=earliest
tool.index.topic=osh.tool.index
tool.index.es-index=osh_tool_search

elasticsearch.hosts=http://43.242.200.25:9200
elasticsearch.index=osh_course_search_read
elasticsearch.username=elastic
elasticsearch.password=osh88888888
elasticsearch.bulk-flush-max-actions=1

log4j.rootLogger=INFO, console
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.Target=System.out
